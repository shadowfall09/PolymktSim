site_name: MiroFlow
site_description: Performance-first agent framework that makes any model better — and proves it

theme:
  name: material
  logo: assets/miromind_logomark.png
  favicon: assets/miromind_logomark.png
  highlightjs: true
  hljs_languages:
    - yaml
    - rust
    - python
    - bash
  locale: en
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - header.autohide
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables

repo_name: miroflow
repo_url: https://github.com/MiroMindAI/miroflow

nav:
  - Home:
    - Overview: index.md
    - Why MiroFlow: why_miroflow.md
    - What's New in v1.7: whats_new.md

  - Getting Started:
