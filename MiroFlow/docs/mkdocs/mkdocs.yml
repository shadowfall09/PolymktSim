    - Core Concepts: core_concepts.md
    - Configuration: yaml_config.md

  - Model Comparison:
    - Leaderboard: model_comparison.md
    - Evaluation Methodology: evaluation_overview.md

  - Benchmarks:
    - GAIA:
      - Prerequisites: gaia_validation_prerequisites.md
      - Claude 3.7 Sonnet: gaia_validation_claude37sonnet.md
      - GPT-5: gaia_validation_gpt5.md
      - MiroThinker: gaia_validation_mirothinker.md
      - Text-Only: gaia_validation_text_only.md
      - Test Set: gaia_test.md
    - BrowseComp:
      - English: browsecomp_en.md
      - Chinese: browsecomp_zh.md
    - Other Benchmarks:
      - HLE: hle.md
      - HLE Text-Only: hle_text_only.md
      - FutureX: futurex.md
      - xBench-DeepSearch: xbench_ds.md
      - FinSearchComp: finsearchcomp.md
      - WebWalkerQA: webwalkerqa.md
      - FRAMES-Test: download_datasets.md
    - Add New Benchmark: contribute_benchmarks.md

  - Tools:
